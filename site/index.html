<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Epicycle — draw it, watch it spin</title>
    <meta
      name="description"
      content="Draw any shape and watch a chain of spinning circles — a Fourier series — retrace it in real time."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="wordmark">
        <canvas id="wordmark-glyph" width="40" height="40" aria-hidden="true"></canvas>
        picycle
      </span>
      <button
        id="mute-toggle"
        class="icon-button"
        type="button"
        aria-label="Mute sound"
        aria-pressed="false"
      >
        <span aria-hidden="true">&#128266;</span>
      </button>
    </header>

    <main class="stage">
      <section class="canvas-panel">
        <canvas id="epicycle-canvas" aria-label="Epicycle drawing and retrace canvas"></canvas>
        <p id="hint" class="hint" hidden>Draw anything, watch it spin</p>
        <p id="stroke-message" class="stroke-message" role="status" aria-live="polite" hidden></p>
      </section>
      <aside class="control-rail" aria-label="Controls">
        <div class="control-group">
          <span class="control-label">Presets</span>
          <div class="preset-group" role="group" aria-label="Preset shapes">
            <button class="button button--ghost" type="button" data-preset="star">Star</button>
            <button class="button button--ghost" type="button" data-preset="heart">Heart</button>
            <button class="button button--ghost" type="button" data-preset="infinity">Infinity</button>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label" for="circle-count">
            Circles <output id="circle-count-value" for="circle-count">0</output>
          </label>
          <input type="range" id="circle-count" min="1" max="1" value="1" disabled />
        </div>

        <div class="control-group">
          <label class="switch">
            <input type="checkbox" id="toggle-circles" checked />
            <span class="switch__track" aria-hidden="true"><span class="switch__thumb"></span></span>
            <span class="switch__label">Show circle chain</span>
          </label>
        </div>

        <div class="control-group control-group--row">
          <button id="play-pause" class="button" type="button" disabled>
            <span aria-hidden="true">&#10074;&#10074;</span> Pause
          </button>
          <button id="restart" class="button button--ghost" type="button" disabled>
            <span aria-hidden="true">&#8635;</span> Restart
          </button>
        </div>

        <div class="control-group">
          <label class="control-label" for="speed">
            Speed <output id="speed-value" for="speed">1.0&times;</output>
          </label>
          <input type="range" id="speed" min="0.25" max="3" step="0.25" value="1" />
        </div>

        <div class="control-group control-group--row">
          <button id="export-png" class="button button--ghost" type="button" disabled>
            Save PNG
          </button>
          <button id="export-video" class="button button--ghost" type="button" disabled>
            Export video
          </button>
        </div>
      </aside>
    </main>

    <div id="live-region" class="sr-only" role="status" aria-live="polite"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
